# Deploy the playable game to GitHub Pages
# Only deploys game files — no docs, tests, node_modules, or src/
name: Deploy game to Pages

on:
  push:
    branches: ["main"]
    paths-ignore:
      - 'docs/**'
      - 'test/**'
      - '*.md'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM domain
        run: wasm-pack build robot-buddy-domain --target web --out-dir ../dist/wasm

      - name: Install and build JS
        run: |
          npm ci
          npm run build
          npm test

      - name: Prepare deploy directory
        run: |
          mkdir -p _site/dist/wasm
          # Copy only the game files that the browser needs
          cp index.html _site/
          cp adapter.js wasm-bridge.js game.js dialogue.js sprites.js world.js characters.js _site/
          # Copy built bundles
          cp dist/speech-recognition.js _site/dist/
          cp dist/wasm/robot_buddy_domain_bg.wasm _site/dist/wasm/
          cp dist/wasm/robot_buddy_domain.js _site/dist/wasm/
          mkdir -p _site/src
          cp -r src/presentation _site/src/presentation

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
