# Deploy the playable game to GitHub Pages
# Only deploys game files — no docs, tests, node_modules, or src/
name: Deploy game to Pages

on:
  push:
    branches: ["main"]
    paths-ignore:
      - 'docs/**'
      - 'test/**'
      - '*.md'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build
        run: |
          npm ci
          npm run build
          npm test

      - name: Prepare deploy directory
        run: |
          mkdir -p _site/dist
          # Copy only the game files that the browser needs
          cp index.html _site/
          cp *.js _site/ 2>/dev/null || true
          # Copy the built bundles
          cp dist/learning-domain.js _site/dist/
          cp dist/economy-domain.js _site/dist/
          cp dist/speech-recognition.js _site/dist/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
