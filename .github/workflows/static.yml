# Deploy the playable game to GitHub Pages
# Macroquad WASM build — no Node, no npm, one toolchain
name: Deploy game to Pages

on:
  push:
    branches: ["main"]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Run tests
        run: cargo test

      - name: Build WASM and assemble www/
        run: ./build-wasm.sh

      - name: Prepare deploy directory
        run: |
          mkdir -p _site
          cp robot-buddy-game/www/index.html _site/
          cp robot-buddy-game/www/mq_js_bundle.js _site/
          cp robot-buddy-game/www/robot-buddy-game.wasm _site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
